<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세일즈 AI 분석 챗봇</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #00e5a0;
    --accent2: #00b87a;
    --accent-dim: rgba(0,229,160,0.1);
    --text: #e8eaf0;
    --text2: #8a8f9e;
    --text3: #555b6a;
    --user-bubble: #1a3a2e;
    --user-border: rgba(0,229,160,0.25);
    --bot-bubble: #1a1e26;
    --chart-bg: #13161b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    padding: 0 28px;
    height: 58px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    gap: 14px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: 2px; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .data-badge {
    font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 4px 10px; border-radius: 20px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(0,229,160,0.2);
    display: none;
  }
  .data-badge.visible { display: block; }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 10px;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-sm);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg3);
  }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone.dragover { border-color: var(--accent); background: var(--accent-dim); }
  .upload-icon { font-size: 24px; margin-bottom: 6px; }
  .upload-zone p { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .upload-zone small { font-size: 11px; color: var(--text3); }
  #file-input { display: none; }

  .sample-btn {
    width: 100%; margin-top: 8px; padding: 8px;
    background: transparent; border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text2);
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    font-family: 'Pretendard', sans-serif;
  }
  .sample-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Data info */
  #data-info { display: none; }
  #data-info.visible { display: block; }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; font-size: 12px;
  }
  .info-key { color: var(--text3); }
  .info-val { color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Columns list */
  .col-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .col-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-family: 'DM Mono', monospace;
  }
  .col-tag.num { border-color: rgba(0,229,160,0.3); color: var(--accent); background: var(--accent-dim); }

  /* Quick questions */
  .quick-list { display: flex; flex-direction: column; gap: 5px; }
  .quick-item {
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 12px; color: var(--text2);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    background: var(--bg3); text-align: left;
    font-family: 'Pretendard', sans-serif;
  }
  .quick-item:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* CHAT PANEL */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Welcome screen */
  #welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 40px;
    text-align: center;
  }
  #welcome h2 { font-size: 22px; font-weight: 500; color: var(--text); }
  #welcome p { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 400px; }
  .welcome-arrow {
    font-size: 12px; color: var(--text3);
    margin-top: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 20px;
    display: none;
  }
  #messages.visible { display: flex; }

  .msg-row { display: flex; gap: 12px; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
    margin-top: 2px;
  }
  .bot-av { background: var(--accent); color: #000; }
  .user-av { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); font-size: 11px; }

  .msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 8px; }
  .msg-row.user .msg-content { align-items: flex-end; }

  .bubble {
    padding: 11px 15px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.6;
  }
  .bot .bubble {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; color: var(--text);
  }
  .user .bubble {
    background: var(--user-bubble); border: 1px solid var(--user-border);
    border-radius: 16px 4px 16px 16px; color: var(--text);
  }

  /* Chart card */
  .chart-card {
    background: var(--chart-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    width: 100%; max-width: 560px;
  }
  .chart-title { font-size: 12px; color: var(--text2); margin-bottom: 12px; font-family: 'DM Mono', monospace; }
  .chart-card canvas { max-height: 220px; }

  /* Typing */
  .typing-row { display: flex; gap: 12px; }
  .typing-bubble {
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    padding: 14px 18px; display: flex; gap: 5px; align-items: center;
  }
  .typing-bubble span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); animation: blink 1.2s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

  /* Suggestion chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12px; padding: 5px 11px; border-radius: 20px;
    border: 1px solid var(--border2); color: var(--text2);
    cursor: pointer; transition: all 0.15s; background: transparent;
    font-family: 'Pretendard', sans-serif;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* INPUT BAR */
  .input-bar {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1; display: flex; align-items: flex-end;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 24px; padding: 10px 16px; gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  #msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 14px; resize: none;
    font-family: 'Pretendard', sans-serif;
    max-height: 100px; line-height: 1.5;
  }
  #msg-input::placeholder { color: var(--text3); }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  #send-btn:hover { background: #00ff9f; transform: scale(1.05); }
  #send-btn:disabled { background: var(--bg3); cursor: default; transform: none; }
  #send-btn svg { width: 16px; height: 16px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="9" width="3" height="6" rx="1" fill="#000"/>
        <rect x="6" y="5" width="3" height="10" rx="1" fill="#000"/>
        <rect x="11" y="1" width="3" height="14" rx="1" fill="#000"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Sales AI</div>
      <div class="logo-sub">데이터 분석 챗봇</div>
    </div>
  </div>
  <div class="header-right">
    <span class="data-badge" id="data-badge">● 데이터 로드됨</span>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">데이터 업로드</div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📂</div>
        <p>CSV 파일을 업로드하세요</p>
        <small>클릭 또는 드래그 앤 드롭</small>
        <input type="file" id="file-input" accept=".csv">
      </div>
      <button class="sample-btn" onclick="loadSampleData()">📊 샘플 데이터로 시작하기</button>
    </div>

    <div class="sidebar-section" id="data-info">
      <div class="sidebar-label">데이터 정보</div>
      <div class="info-row"><span class="info-key">파일명</span><span class="info-val" id="info-file">—</span></div>
      <div class="info-row"><span class="info-key">행 수</span><span class="info-val" id="info-rows">—</span></div>
      <div class="info-row"><span class="info-key">열 수</span><span class="info-val" id="info-cols">—</span></div>
      <div style="margin-top: 10px;">
        <div class="sidebar-label">컬럼</div>
        <div class="col-list" id="col-list"></div>
      </div>
    </div>

    <div class="sidebar-section" id="quick-section" style="display:none; flex:1; overflow-y:auto;">
      <div class="sidebar-label">빠른 질문</div>
      <div class="quick-list" id="quick-list"></div>
    </div>
  </aside>

  <!-- CHAT PANEL -->
  <section class="chat-panel">
    <div id="welcome">
      <div style="font-size:48px">📈</div>
      <h2>세일즈 데이터를 AI로 분석하세요</h2>
      <p>CSV 파일을 업로드하고 자연어로 질문하면<br>자동으로 차트와 인사이트를 생성해드립니다.</p>
      <div class="welcome-arrow">← 왼쪽에서 파일을 업로드하거나 샘플 데이터를 사용해보세요</div>
    </div>

    <div id="messages"></div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="질문을 입력하세요... (예: 월별 매출 트렌드 보여줘)" rows="1" disabled></textarea>
      </div>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </section>
</div>

<script>
const ANTHROPIC_API_KEY = ''; // 여기에 API 키를 입력하거나 아래 프롬프트 입력 방식 사용

let salesData = [], columns = [], numColumns = [], catColumns = [], fileName = '';
let chartInstances = {}, chartIdx = 0;
let isTyping = false;

const messagesEl = document.getElementById('messages');
const welcomeEl = document.getElementById('welcome');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

// ——— DRAG & DROP ———
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) parseCSV(file);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) parseCSV(e.target.files[0]);
});

function parseCSV(file) {
  Papa.parse(file, {
    header: true, skipEmptyLines: true, dynamicTyping: true,
    complete: r => initData(r.data, r.meta.fields, file.name)
  });
}

function loadSampleData() {
  const data = [
    {월:'1월',제품:'노트북',지역:'서울',담당자:'김민준',카테고리:'IT기기',매출:4200000,수량:12,이익률:0.28},
    {월:'1월',제품:'마우스',지역:'부산',담당자:'이서연',카테고리:'주변기기',매출:850000,수량:45,이익률:0.42},
    {월:'1월',제품:'모니터',지역:'대구',담당자:'박지호',카테고리:'IT기기',매출:3100000,수량:8,이익률:0.31},
    {월:'2월',제품:'노트북',지역:'서울',담당자:'김민준',카테고리:'IT기기',매출:5100000,수량:15,이익률:0.29},
    {월:'2월',제품:'키보드',지역:'부산',담당자:'이서연',카테고리:'주변기기',매출:620000,수량:30,이익률:0.45},
    {월:'2월',제품:'모니터',지역:'서울',담당자:'최수아',카테고리:'IT기기',매출:2800000,수량:7,이익률:0.30},
    {월:'3월',제품:'노트북',지역:'대구',담당자:'박지호',카테고리:'IT기기',매출:6300000,수량:18,이익률:0.27},
    {월:'3월',제품:'마우스',지역:'서울',담당자:'최수아',카테고리:'주변기기',매출:1100000,수량:58,이익률:0.43},
    {월:'3월',제품:'키보드',지역:'부산',담당자:'이서연',카테고리:'주변기기',매출:980000,수량:47,이익률:0.44},
    {월:'4월',제품:'모니터',지역:'서울',담당자:'김민준',카테고리:'IT기기',매출:3900000,수량:10,이익률:0.32},
    {월:'4월',제품:'노트북',지역:'부산',담당자:'이서연',카테고리:'IT기기',매출:5700000,수량:16,이익률:0.28},
    {월:'4월',제품:'마우스',지역:'대구',담당자:'박지호',카테고리:'주변기기',매출:740000,수량:39,이익률:0.41},
    {월:'5월',제품:'노트북',지역:'서울',담당자:'최수아',카테고리:'IT기기',매출:7200000,수량:21,이익률:0.30},
    {월:'5월',제품:'키보드',지역:'대구',담당자:'박지호',카테고리:'주변기기',매출:1150000,수량:55,이익률:0.46},
    {월:'5월',제품:'모니터',지역:'부산',담당자:'이서연',카테고리:'IT기기',매출:4400000,수량:11,이익률:0.33},
    {월:'6월',제품:'노트북',지역:'서울',담당자:'김민준',카테고리:'IT기기',매출:8100000,수량:23,이익률:0.31},
    {월:'6월',제품:'마우스',지역:'부산',담당자:'최수아',카테고리:'주변기기',매출:1350000,수량:71,이익률:0.44},
    {월:'6월',제품:'키보드',지역:'대구',담당자:'박지호',카테고리:'주변기기',매출:1280000,수량:61,이익률:0.47},
  ];
  initData(data, Object.keys(data[0]), '샘플_세일즈_데이터.csv');
}

function initData(data, cols, name) {
  salesData = data; columns = cols; fileName = name;
  numColumns = cols.filter(c => data.some(r => typeof r[c] === 'number' && !isNaN(r[c])));
  catColumns = cols.filter(c => !numColumns.includes(c));

  // UI updates
  document.getElementById('data-badge').classList.add('visible');
  document.getElementById('data-info').classList.add('visible');
  document.getElementById('info-file').textContent = name.length > 16 ? name.slice(0,14)+'…' : name;
  document.getElementById('info-rows').textContent = data.length + '행';
  document.getElementById('info-cols').textContent = cols.length + '열';

  const colList = document.getElementById('col-list');
  colList.innerHTML = cols.map(c =>
    `<span class="col-tag ${numColumns.includes(c)?'num':''}">${c}</span>`
  ).join('');

  buildQuickQuestions();

  document.getElementById('quick-section').style.display = 'block';
  msgInput.disabled = false;
  sendBtn.disabled = false;
  welcomeEl.style.display = 'none';
  messagesEl.style.display = 'flex';
  messagesEl.classList.add('visible');

  addBotMessage(`**${name}** 파일을 성공적으로 불러왔어요! 📊\n\n총 **${data.length}행**, **${cols.length}개 컬럼**이 있고, 숫자 컬럼은 [${numColumns.join(', ')}]입니다.\n\n어떤 분석이 필요하세요?`, buildDefaultChips());
}

function buildQuickQuestions() {
  const quickList = document.getElementById('quick-list');
  const qs = [];
  if (numColumns.length > 0) {
    const n = numColumns[0];
    if (catColumns.length > 0) qs.push(`${catColumns[0]}별 ${n} 비교`);
    if (catColumns.length > 1) qs.push(`${catColumns[1]}별 ${n} 순위`);
    qs.push(`${n} 전체 합계와 평균`);
    if (numColumns.length > 1) qs.push(`${numColumns[0]}과 ${numColumns[1]} 상관관계`);
    if (catColumns.length > 0) qs.push(`${catColumns[0]} 분포 파이차트`);
  }
  quickList.innerHTML = qs.map(q =>
    `<button class="quick-item" onclick="askQuestion('${q}')">${q}</button>`
  ).join('');
}

function buildDefaultChips() {
  const chips = [];
  if (catColumns.length > 0 && numColumns.length > 0) chips.push(`${catColumns[0]}별 ${numColumns[0]} 차트`);
  if (numColumns.length > 0) chips.push(`${numColumns[0]} 트렌드 분석`);
  chips.push('데이터 요약 통계');
  return chips;
}

// ——— CHAT LOGIC ———
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
});
sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isTyping) return;
  askQuestion(text);
}

async function askQuestion(q) {
  if (isTyping) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  addUserMessage(q);
  isTyping = true;

  const typingEl = addTyping();

  try {
    const result = await analyzeWithAI(q);
    typingEl.remove();
    renderResult(result);
  } catch (e) {
    typingEl.remove();
    const fallback = localAnalysis(q);
    renderResult(fallback);
  }

  isTyping = false;
  scrollBottom();
}

async function analyzeWithAI(question) {
  const sample = salesData.slice(0, 20);
  const prompt = `당신은 세일즈 데이터 분석 전문가입니다. 다음 데이터를 분석하고 질문에 답하세요.

데이터 정보:
- 컬럼: ${columns.join(', ')}
- 숫자형 컬럼: ${numColumns.join(', ')}
- 카테고리 컬럼: ${catColumns.join(', ')}
- 전체 행 수: ${salesData.length}
- 샘플 데이터 (최대 20행): ${JSON.stringify(sample)}
- 전체 데이터: ${JSON.stringify(salesData)}

사용자 질문: "${question}"

반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요:
{
  "message": "분석 결과 설명 (한국어, 2-3문장)",
  "chartType": "bar 또는 line 또는 pie 또는 doughnut 또는 none",
  "chartTitle": "차트 제목",
  "labels": ["라벨1", "라벨2", ...],
  "datasets": [
    {
      "label": "데이터셋 이름",
      "data": [숫자1, 숫자2, ...]
    }
  ],
  "insight": "핵심 인사이트 1줄",
  "chips": ["추가 질문1", "추가 질문2", "추가 질문3"]
}

chartType이 none이면 datasets와 labels는 빈 배열로 주세요.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) throw new Error('API error');
  const d = await res.json();
  const raw = d.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(raw);
}

function localAnalysis(question) {
  const q = question.toLowerCase();
  const numCol = numColumns[0] || '';
  const catCol = catColumns[0] || '';

  // Group by first categorical column
  if (catCol && numCol) {
    const groups = {};
    salesData.forEach(r => {
      const k = String(r[catCol]);
      if (!groups[k]) groups[k] = 0;
      const v = parseFloat(String(r[numCol]).replace(/,/g,''));
      if (!isNaN(v)) groups[k] += v;
    });
    const labels = Object.keys(groups);
    const data = labels.map(l => Math.round(groups[l]));

    let chartType = 'bar';
    if (q.includes('파이') || q.includes('pie') || q.includes('비율') || q.includes('분포')) chartType = 'pie';
    if (q.includes('추이') || q.includes('트렌드') || q.includes('변화') || q.includes('line')) chartType = 'line';

    const total = data.reduce((a, b) => a + b, 0);
    const max = Math.max(...data);
    const maxLabel = labels[data.indexOf(max)];

    return {
      message: `${catCol}별로 ${numCol}을 집계했습니다. 총합은 ${total.toLocaleString()}이며, ${maxLabel}이(가) ${max.toLocaleString()}으로 가장 높습니다.`,
      chartType,
      chartTitle: `${catCol}별 ${numCol}`,
      labels, datasets: [{ label: numCol, data }],
      insight: `💡 ${maxLabel}의 ${numCol}이 전체의 ${Math.round(max/total*100)}%를 차지합니다.`,
      chips: [`${numCol} 평균 비교`, `${catCol} 순위 TOP 3`, '다른 컬럼 분석']
    };
  }

  return {
    message: `데이터를 분석했습니다. 총 ${salesData.length}개의 행이 있으며, 컬럼은 [${columns.join(', ')}]입니다.`,
    chartType: 'none', chartTitle: '', labels: [], datasets: [],
    insight: '💡 더 구체적인 질문을 해보세요. 예: "제품별 매출 차트"',
    chips: numColumns.length > 0 ? [`${catColumns[0] || ''}별 ${numColumns[0]} 분석`, `${numColumns[0]} 합계`, '전체 요약'] : []
  };
}

function renderResult(result) {
  const chips = result.chips && result.chips.length > 0 ? result.chips : [];
  let html = `<p style="white-space:pre-wrap">${(result.message || '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`;
  if (result.insight) html += `<p style="margin-top:8px; font-size:12px; color:#8a8f9e">${result.insight}</p>`;

  const msgEl = addBotMessage(html, chips, true);

  if (result.chartType && result.chartType !== 'none' && result.labels && result.labels.length > 0) {
    const chartDiv = document.createElement('div');
    chartDiv.className = 'chart-card';
    const id = 'chart-' + (chartIdx++);
    chartDiv.innerHTML = `<div class="chart-title">${result.chartTitle || ''}</div><canvas id="${id}"></canvas>`;
    msgEl.querySelector('.msg-content').insertBefore(chartDiv, msgEl.querySelector('.chips'));

    setTimeout(() => {
      if (chartInstances[id]) chartInstances[id].destroy();
      const PALETTE = ['#00e5a0','#378ADD','#D85A30','#D4537E','#BA7517','#7F77DD','#639922','#E24B4A','#5DCAA5','#F09595'];
      const ctx = document.getElementById(id).getContext('2d');
      const isPie = result.chartType === 'pie' || result.chartType === 'doughnut';
      chartInstances[id] = new Chart(ctx, {
        type: result.chartType,
        data: {
          labels: result.labels,
          datasets: result.datasets.map((ds, i) => ({
            label: ds.label,
            data: ds.data,
            backgroundColor: isPie
              ? result.labels.map((_, j) => PALETTE[j % PALETTE.length] + 'cc')
              : PALETTE[i % PALETTE.length] + '33',
            borderColor: isPie
              ? result.labels.map((_, j) => PALETTE[j % PALETTE.length])
              : PALETTE[i % PALETTE.length],
            borderWidth: 2,
            tension: 0.4,
            fill: result.chartType === 'line',
            pointRadius: result.chartType === 'line' ? 4 : 0,
            pointBackgroundColor: PALETTE[i % PALETTE.length],
          }))
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: isPie,
              labels: { color: '#8a8f9e', font: { size: 11 }, boxWidth: 12, padding: 12 }
            },
            tooltip: {
              backgroundColor: '#1a1e26',
              borderColor: 'rgba(255,255,255,0.1)',
              borderWidth: 1,
              titleColor: '#e8eaf0',
              bodyColor: '#8a8f9e',
              callbacks: {
                label: ctx => {
                  const v = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
                  return ' ' + (typeof v === 'number' ? v.toLocaleString() : v);
                }
              }
            }
          },
          scales: isPie ? {} : {
            x: { ticks: { color: '#555b6a', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
            y: { ticks: { color: '#555b6a', font: { size: 11 }, callback: v => v.toLocaleString() }, grid: { color: 'rgba(255,255,255,0.06)' } }
          }
        }
      });
    }, 50);
  }
}

// ——— DOM HELPERS ———
function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg-row user';
  div.innerHTML = `
    <div class="avatar user-av">나</div>
    <div class="msg-content">
      <div class="bubble">${text}</div>
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addBotMessage(html, chips = [], raw = false) {
  const div = document.createElement('div');
  div.className = 'msg-row bot';
  const chipsHtml = chips.length > 0
    ? `<div class="chips">${chips.map(c => `<button class="chip" onclick="askQuestion('${c}')">${c}</button>`).join('')}</div>`
    : '';
  div.innerHTML = `
    <div class="avatar bot-av">AI</div>
    <div class="msg-content">
      <div class="bubble">${raw ? html : html}</div>
      ${chipsHtml}
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing-row';
  div.innerHTML = `
    <div class="avatar bot-av">AI</div>
    <div class="typing-bubble">
      <span></span><span></span><span></span>
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

  if (!ANTHROPIC_API_KEY) {
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;bottom:80px;right:20px;background:#1a1e26;border:1px solid rgba(0,229,160,0.3);color:#8a8f9e;font-size:12px;padding:12px 16px;border-radius:10px;max-width:260px;z-index:100;line-height:1.6;';
    notice.innerHTML = '⚠️ <strong style="color:#00e5a0">API 키 미설정</strong><br>HTML 파일 상단의 <code style="color:#00e5a0">ANTHROPIC_API_KEY</code>에 키를 입력하면 Claude AI가 분석합니다. 키 없이도 기본 분석은 동작합니다.';
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 8000);
  }
});
