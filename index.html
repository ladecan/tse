<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9eb81b2d9508d3c7222269657b22d9a6&libraries=services&autoload=false"></script>
<style>
body { font-family: sans-serif; padding: 40px; }
button { padding: 8px 16px; cursor: pointer; }
#result { margin-top: 20px; font-size: 14px; }

.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; align-items:center; justify-content:center; }
.ov.open { display:flex; }
.box { background:#fff; border-radius:8px; width:460px; max-width:95vw; }
.hd { padding:12px 16px; background:#1e3a5f; display:flex; justify-content:space-between; border-radius:8px 8px 0 0; }
.hd span { color:#fff; font-size:13px; font-weight:600; }
.hd button { border:none; background:none; color:#fff; font-size:20px; cursor:pointer; }
.input-wrap { padding:12px 14px; border-bottom:1px solid #ddd; }
.input-wrap input { width:100%; padding:8px 11px; border:1.5px solid #1e3a5f; border-radius:5px; font-size:13px; outline:none; box-sizing:border-box; }
.results { max-height:300px; overflow-y:auto; border-radius:0 0 8px 8px; }
.item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #f0eeeb; }
.item:hover { background:#f2f5fa; }
.item .name { font-size:13px; font-weight:600; color:#1c1a18; }
.item .addr { font-size:11px; color:#8a8480; margin-top:2px; }
.empty { padding:32px; text-align:center; color:#8a8480; font-size:12px; }
</style>
</head>
<body>

<p>주소: <span id="result">없음</span></p>
<button onclick="openModal()">🔍 주소검색</button>

<div class="ov" id="modal">
  <div class="box">
    <div class="hd">
      <span>🔍 주소 검색</span>
      <button onclick="closeModal()">×</button>
    </div>
    <div class="input-wrap">
      <input type="text" id="searchInput" placeholder="병원명, 장소명으로 검색" autocomplete="off">
    </div>
    <div class="results" id="results">
      <div class="empty">검색어를 입력하세요</div>
    </div>
  </div>
</div>

<script>
let _ps = null;
let _timer = null;

function _initKakao() {
  if (typeof kakao !== "undefined" && kakao.maps) {
    kakao.maps.load(() => { _ps = new kakao.maps.services.Places(); });
  } else {
    setTimeout(_initKakao, 300);
  }
}
_initKakao();

function openModal() {
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("searchInput").focus(), 80);
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("searchInput").value = "";
  document.getElementById("results").innerHTML = '<div class="empty">검색어를 입력하세요</div>';
}

document.getElementById("searchInput").addEventListener("input", function() {
  const q = this.value.trim();
  const res = document.getElementById("results");
  clearTimeout(_timer);
  if (!q) { res.innerHTML = '<div class="empty">검색어를 입력하세요</div>'; return; }
  _timer = setTimeout(() => {
    if (!_ps) { res.innerHTML = '<div class="empty">카카오 연결 중...</div>'; return; }
    _ps.keywordSearch(q, (items, status) => {
      res.innerHTML = "";
      if (status === kakao.maps.services.Status.OK) {
        items.slice(0, 10).forEach(item => {
          const addr = item.road_address_name || item.address_name;
          const div = document.createElement("div");
          div.className = "item";
          div.innerHTML = `<div class="name">${item.place_name}</div><div class="addr">${addr}</div>`;
          div.addEventListener("mousedown", function(e) {
            e.preventDefault();
            e.stopPropagation();
            _ps.addressSearch(addr, (r, s) => {
              let zip = "";
              if (s === kakao.maps.services.Status.OK && r[0]) {
                zip = r[0].road_address?.zone_no || "";
              }
              document.getElementById("result").textContent = addr + (zip ? ` (${zip})` : "");
              closeModal();
            });
          });
          res.appendChild(div);
        });
      } else {
        res.innerHTML = '<div class="empty">검색 결과 없음</div>';
      }
    });
  }, 250);
});
</script>
</body>
</html>
