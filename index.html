<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세일즈 AI 분석 챗봇</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.1);
  --text:#e8eaf0;--text2:#8a8f9e;--text3:#555b6a;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard",-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;padding:0 24px;height:54px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:12px}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:14px;height:14px}
.logo-text{font-size:14px;font-weight:600}
.logo-sub{font-size:11px;color:var(--text3);font-family:"DM Mono",monospace}
.hstats{margin-left:auto;display:flex;gap:18px}
.hstat{font-size:12px;font-family:"DM Mono",monospace;color:var(--text3)}
.hstat span{color:var(--accent);font-weight:500}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:230px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-section{padding:13px;border-bottom:1px solid var(--border)}
.slbl{font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kpi-card{background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px}
.kpi-val{font-size:14px;font-weight:600;color:var(--accent);font-family:"DM Mono",monospace}
.kpi-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.quick-list{display:flex;flex-direction:column;gap:4px}
.quick-item{padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg3);text-align:left;font-family:"Pretendard",sans-serif;line-height:1.4}
.quick-item:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.filter-section{padding:13px;flex:1;overflow-y:auto}
.filter-group{margin-bottom:10px}
.filter-label{font-size:11px;color:var(--text3);margin-bottom:3px}
select.fsel{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;color:var(--text);font-family:"Pretendard",sans-serif;outline:none}
select.fsel:focus{border-color:var(--accent)}
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.msg-row{display:flex;gap:10px}
.msg-row.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px}
.bot-av{background:var(--accent);color:#000}
.user-av{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.msg-content{max-width:83%;display:flex;flex-direction:column;gap:7px}
.msg-row.user .msg-content{align-items:flex-end}
.bubble{padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.65}
.bot .bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--text)}
.user .bubble{background:#1a3a2e;border:1px solid rgba(0,229,160,.25);border-radius:16px 4px 16px 16px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:2px}
.chart-title{font-size:11px;color:var(--text3);margin-bottom:10px;font-family:"DM Mono",monospace}
.insight-box{background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;background:transparent;font-family:"Pretendard",sans-serif}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.typing-row{display:flex;gap:10px}
.typing-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;padding:12px 16px;display:flex;gap:4px;align-items:center}
.typing-bubble span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.2s ease-in-out infinite}
.typing-bubble span:nth-child(2){animation-delay:.2s}
.typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.input-bar{padding:13px 24px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.input-wrap{flex:1;display:flex;align-items:flex-end;background:var(--bg3);border:1px solid var(--border2);border-radius:24px;padding:9px 16px;gap:8px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13.5px;resize:none;font-family:"Pretendard",sans-serif;max-height:80px;line-height:1.5}
#msg-input::placeholder{color:var(--text3)}
#send-btn{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#send-btn:hover{transform:scale(1.07)}
#send-btn svg{width:14px;height:14px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
table.dtbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
table.dtbl th{color:var(--text3);font-weight:500;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border)}
table.dtbl td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text2)}
table.dtbl tr:last-child td{border-bottom:none}
table.dtbl td.num{text-align:right;color:var(--accent);font-family:"DM Mono",monospace}
</style>
</head>

      <div class="filter-group"><div class="filter-label">지역</div><select class="fsel" id="f-ter"><option value="">전체</option></select></div>
    </div>
  </aside>
  <section class="chat-panel">
    <div id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="질문을 입력하세요... (예: 연도별 매출 추이, 제품별 비교, SR 실적 순위, 지역별 분포)" rows="1"></textarea>
      </div>
      <button id="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>

  </section>
</div>

// ── 필터 적용 ──────────────────────────────────────────────────
function getFilteredData() {
  const yr = document.getElementById('f-year').value;
  const pr = document.getElementById('f-prod').value;
  const sr = document.getElementById('f-sr').value;
  const te = document.getElementById('f-ter').value;
  return ALL_DATA.filter(r =>
    (!yr || String(r.year) === yr) &&
    (!pr || (r.product||'').toLowerCase() === pr.toLowerCase()) &&
    (!sr || (r.SR||'') === sr) &&
    (!te || (r.territory||'') === te)
  );
}

// ── 집계 유틸 ──────────────────────────────────────────────────
function groupBy(arr, key, valueKey) {
  const m = {};
  arr.forEach(r => {
    const k = String(r[key] || '기타');
    if (!m[k]) m[k] = 0;
    m[k] += (r[valueKey] || 0);
  });
  return m;
}
function topN(obj, n=10) {
  return Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0,n);
}
function fmt(n) { return Math.round(n).toLocaleString(); }
function fmtB(n) { return (n/1e8).toFixed(1)+'억'; }

// ── 초기화 ────────────────────────────────────────────────────
function initFilters() {
  const years = [...new Set(ALL_DATA.map(r=>r.year))].sort();
  const products = [...new Set(ALL_DATA.map(r=>r.product).filter(Boolean))].sort();
  const srs = [...new Set(ALL_DATA.map(r=>r.SR).filter(Boolean))].sort();
  const ters = [...new Set(ALL_DATA.map(r=>r.territory).filter(Boolean))].sort();
  const fill = (id, arr) => { const s=document.getElementById(id); arr.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; s.appendChild(o); }); };
  fill('f-year', years); fill('f-prod', products); fill('f-sr', srs); fill('f-ter', ters);
  ['f-year','f-prod','f-sr','f-ter'].forEach(id => document.getElementById(id).addEventListener('change', updateKPI));
}

function updateKPI() {
  const d = getFilteredData();
  const total = d.reduce((s,r)=>s+r.매출금액,0);
  const rows = d.length;
  const products = new Set(d.map(r=>r.product).filter(Boolean)).size;
  const srs = new Set(d.map(r=>r.SR).filter(Boolean)).size;
  const years = new Set(d.map(r=>r.year)).size;
  document.getElementById('hs-rows').textContent = rows.toLocaleString();
  document.getElementById('hs-total').textContent = fmtB(total);
  document.getElementById('hs-prods').textContent = products;
  const grid = document.getElementById('kpi-grid');
  const byYear = groupBy(d, 'year', '매출금액');
  const lastYear = Math.max(...Object.keys(byYear).map(Number));
  const prevYear = lastYear - 1;
  const growth = byYear[prevYear] ? ((byYear[lastYear]-byYear[prevYear])/byYear[prevYear]*100).toFixed(1) : null;
  grid.innerHTML = `
    <div class="kpi-card"><div class="kpi-val">${fmtB(total)}</div><div class="kpi-lbl">총 매출</div></div>
    <div class="kpi-card"><div class="kpi-val">${rows}</div><div class="kpi-lbl">거래 건수</div></div>
    <div class="kpi-card"><div class="kpi-val">${srs}</div><div class="kpi-lbl">활성 SR</div></div>
    <div class="kpi-card"><div class="kpi-val">${growth ? growth+'%' : '-'}</div><div class="kpi-lbl">전년 대비</div></div>
  `;
}

function renderChart(type, labels, datasets, title) {
  const id = 'chart-' + (chartIdx++);
  const div = document.createElement('div');
  div.className = 'chart-card';
  div.innerHTML = `<div class="chart-title">${title}</div><canvas id="${id}"></canvas>`;
  const isPie = type === 'pie' || type === 'doughnut';
  setTimeout(() => {
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id).getContext('2d'), {
      type,
      data: {
        labels,
        datasets: datasets.map((ds,i) => ({
          label: ds.label,
          data: ds.data,
          backgroundColor: isPie ? labels.map((_,j)=>PALETTE[j%PALETTE.length]+'cc') : PALETTE[i%PALETTE.length]+'33',
          borderColor: isPie ? labels.map((_,j)=>PALETTE[j%PALETTE.length]) : PALETTE[i%PALETTE.length],
          borderWidth: 2,
          tension: 0.4,
          fill: type==='line',
          pointRadius: type==='line'?4:0,
          pointBackgroundColor: PALETTE[i%PALETTE.length],
        }))
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: isPie, labels: { color:'#8a8f9e', font:{size:11}, boxWidth:12, padding:10 } },
          tooltip: {
            backgroundColor:'#1a1e26', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
            titleColor:'#e8eaf0', bodyColor:'#8a8f9e',
            callbacks: { label: ctx => { const v=ctx.parsed.y!==undefined?ctx.parsed.y:ctx.parsed; return ' '+fmt(v); } }
          }
        },
        scales: isPie ? {} : {
          x: { ticks:{color:'#555b6a',font:{size:11}}, grid:{color:'rgba(255,255,255,0.04)'} },
          y: { ticks:{color:'#555b6a',font:{size:11},callback:v=>fmtB(v)}, grid:{color:'rgba(255,255,255,0.05)'} }
        }
      }
    });
  }, 50);
  return div;
}

// ── 로컬 분석 엔진 ─────────────────────────────────────────
function analyze(question) {
  const q = question.toLowerCase();
  const d = getFilteredData();
  if (!d.length) return { message:'현재 필터 조건에 해당하는 데이터가 없습니다.', type:'none' };

  // 연도별 매출
  if (q.includes('연도') || q.includes('년도') || q.includes('추이') || q.includes('트렌드') || q.includes('변화') || q.includes('성장')) {
    const byYear = groupBy(d, 'year', '매출금액');
    const entries = Object.entries(byYear).sort((a,b)=>a[0]-b[0]);
    const labels = entries.map(e=>e[0]+'년');
    const vals = entries.map(e=>e[1]);
    const maxY = entries.reduce((a,b)=>b[1]>a[1]?b:a);
    const growth = entries.length>=2 ? ((entries[entries.length-1][1]-entries[entries.length-2][1])/entries[entries.length-2][1]*100).toFixed(1) : null;
    return {
      message: `연도별 매출 추이입니다. ${maxY[0]}년이 <strong>${fmtB(maxY[1])}</strong>으로 가장 높았습니다.${growth ? ` 최근 1년 성장률은 <strong>${growth}%</strong>입니다.` : ''}`,
      insight: `💡 2021→2026 총 누적 매출: ${fmtB(d.reduce((s,r)=>s+r.매출금액,0))}`,
      chartType: 'line', chartTitle: '연도별 매출 추이',
      labels, datasets: [{ label:'매출금액', data:vals }],
      chips: ['분기별 매출', 'SR별 연도 실적', '제품별 연도별 비교']
    };
  }
  // 분기별
  if (q.includes('분기')) {
    const byQ = groupBy(d, 'Quarter', '매출금액');
    const entries = Object.entries(byQ).sort((a,b)=>a[0].localeCompare(b[0]));
    const labels = entries.map(e=>e[0]);
    const vals = entries.map(e=>e[1]);
    return {
      message: `분기별 매출을 집계했습니다. 최고 분기는 <strong>${entries.reduce((a,b)=>b[1]>a[1]?b:a)[0]}</strong>입니다.`,
      insight: `💡 평균 분기 매출: ${fmtB(vals.reduce((a,b)=>a+b,0)/vals.length)}`,
      chartType: 'bar', chartTitle: '분기별 매출',
      labels, datasets: [{ label:'매출금액', data:vals }],
      chips: ['연도별 매출', '제품별 매출', 'SR별 실적']
    };
  }
  // 제품별
  if (q.includes('제품') || q.includes('product') || q.includes('모델') || q.includes('장비')) {
    const isPie = q.includes('비율') || q.includes('파이') || q.includes('비중');
    const byProd = groupBy(d, 'product', '매출금액');
    const top = topN(byProd, 10);
    const total = Object.values(byProd).reduce((a,b)=>a+b,0);
    const best = top[0];
    return {
      message: `제품별 매출입니다. <strong>${best[0]}</strong>이 ${fmtB(best[1])}(${(best[1]/total*100).toFixed(1)}%)로 1위입니다.`,
      insight: `💡 상위 3개 제품이 전체의 ${(top.slice(0,3).reduce((s,e)=>s+e[1],0)/total*100).toFixed(0)}%를 차지합니다.`,
      chartType: isPie ? 'pie' : 'bar', chartTitle: '제품별 매출',
      labels: top.map(e=>e[0]), datasets: [{ label:'매출금액', data:top.map(e=>e[1]) }],
      chips: ['제품별 판매 대수', '연도별 제품 트렌드', '제품별 SR 비교']
    };
  }
  // 제품별 대수
  if (q.includes('대수') || q.includes('판매량') || q.includes('수량')) {
    const byProd = groupBy(d, 'product', '대수');
    const top = topN(byProd, 10);
    return {
      message: `제품별 판매 대수입니다. <strong>${top[0][0]}</strong>이 ${top[0][1]}대로 가장 많이 팔렸습니다.`,
      insight: `💡 전체 판매 대수: ${d.reduce((s,r)=>s+r.대수,0)}대`,
      chartType: 'bar', chartTitle: '제품별 판매 대수',
      labels: top.map(e=>e[0]), datasets: [{ label:'판매 대수', data:top.map(e=>e[1]) }],
      chips: ['제품별 매출', 'SR별 판매 대수', '지역별 판매 대수']
    };
  }
  // SR별
  if (q.includes('sr') || q.includes('담당자') || q.includes('영업') || q.includes('실적') || q.includes('순위')) {
    const bySR = groupBy(d, 'SR', '매출금액');
    const top = topN(bySR, 10).filter(e=>e[0]);
    const total = Object.values(bySR).reduce((a,b)=>a+b,0);
    return {
      message: `SR별 매출 실적입니다. <strong>${top[0][0]}</strong>이 ${fmtB(top[0][1])}으로 1위입니다.`,
      insight: `💡 TOP 3 SR: ${top.slice(0,3).map(e=>e[0]).join(', ')}`,
      chartType: 'bar', chartTitle: 'SR별 매출 실적 (TOP 10)',
      labels: top.map(e=>e[0]), datasets: [{ label:'매출금액', data:top.map(e=>e[1]) }],
      chips: ['SR별 판매 대수', 'SR별 제품 분포', 'SR별 연도 비교']
    };
  }
  // 지역별
  if (q.includes('지역') || q.includes('서울') || q.includes('부산') || q.includes('대구') || q.includes('경기') || q.includes('광주')) {
    const byTer = groupBy(d, 'territory', '매출금액');
    const top = topN(byTer, 12).filter(e=>e[0]);
    return {
      message: `지역별 매출입니다. <strong>${top[0][0]}</strong>이 ${fmtB(top[0][1])}으로 가장 높습니다.`,
      insight: `💡 서울/경기 합산: ${fmtB((byTer['서울특별시']||0)+(byTer['경기도']||0))}`,
      chartType: 'bar', chartTitle: '지역별 매출',
      labels: top.map(e=>e[0]), datasets: [{ label:'매출금액', data:top.map(e=>e[1]) }],
      chips: ['지역별 판매 대수', '지역별 SR 분포', '지역별 제품 분포']
    };
  }
  // 딜러/기여
  if (q.includes('딜러') || q.includes('dealer') || q.includes('direct') || q.includes('indirect') || q.includes('기여')) {
    const byType = groupBy(d, 'contribution_type', '매출금액');
    const entries = Object.entries(byType);
    const total = entries.reduce((s,e)=>s+e[1],0);
    return {
      message: `판매 유형별 매출입니다.`,
      insight: `💡 SR직판 vs 딜러 비율: ${entries.filter(e=>e[0]==='SR').map(e=>(e[1]/total*100).toFixed(0)+'%')} vs ${entries.filter(e=>e[0]==='Dealer').map(e=>(e[1]/total*100).toFixed(0)+'%')}`,
      chartType: 'doughnut', chartTitle: 'SR/Dealer 매출 비중',
      labels: entries.map(e=>e[0]), datasets: [{ label:'매출금액', data:entries.map(e=>e[1]) }],
      chips: ['딜러별 매출', 'SR별 실적', '연도별 SR/Dealer 비율']
    };
  }
  // 고객 유형별
  if (q.includes('피부과') || q.includes('고객') || q.includes('타과') || q.includes('성형') || q.includes('병원')) {
    const byCust = groupBy(d, 'customer_type', '매출금액');
    const entries = Object.entries(byCust).filter(e=>e[0]);
    return {
      message: `고객 유형별 매출입니다.`,
      insight: `💡 피부과 고객 비중: ${(((byCust['피부과']||0)/d.reduce((s,r)=>s+r.매출금액,0))*100).toFixed(0)}%`,
      chartType: 'pie', chartTitle: '고객 유형별 매출',
      labels: entries.map(e=>e[0]), datasets: [{ label:'매출금액', data:entries.map(e=>e[1]) }],
      chips: ['제품별 고객 분포', '지역별 고객 유형', 'SR별 고객 유형']
    };
  }
  // 요약/전체
  const total = d.reduce((s,r)=>s+r.매출금액,0);
  const byYear = groupBy(d, 'year', '매출금액');
  const topYear = Object.entries(byYear).sort((a,b)=>b[1]-a[1])[0];
  const byProd = groupBy(d, 'product', '매출금액');
  const topProd = Object.entries(byProd).sort((a,b)=>b[1]-a[1])[0];
  const bySR = groupBy(d, 'SR', '매출금액');
  const topSR = Object.entries(bySR).sort((a,b)=>b[1]-a[1]).filter(e=>e[0])[0];
  return {
    message: `현재 필터 기준 <strong>${d.length}건</strong>의 거래, 총 매출 <strong>${fmtB(total)}</strong>입니다.<br>최고 연도: <strong>${topYear[0]}년</strong>(${fmtB(topYear[1])}), 최고 제품: <strong>${topProd[0]}</strong>, 최고 SR: <strong>${topSR[0]}</strong>`,
    insight: '💡 더 구체적인 분석을 원하시면 아래 버튼을 눌러보세요.',
    chartType: 'bar', chartTitle: '연도별 매출 요약',
    labels: Object.keys(byYear).sort().map(y=>y+'년'),
    datasets: [{ label:'매출금액', data: Object.keys(byYear).sort().map(k=>byYear[k]) }],
    chips: ['연도별 매출 추이', '제품별 매출', 'SR별 실적 순위', '지역별 분포']
  };
}

// ── 채팅 UI ────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const msgInput = document.getElementById('msg-input');
let isTyping = false;

msgInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
msgInput.addEventListener('input', () => { msgInput.style.height='auto'; msgInput.style.height=Math.min(msgInput.scrollHeight,80)+'px'; });
document.getElementById('send-btn').addEventListener('click', sendMessage);

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isTyping) return;
  askQuestion(text);
}

async function askQuestion(q) {
  if(isTyping) return;
  msgInput.value=''; msgInput.style.height='auto';
  addUserMsg(q);
  isTyping = true;
  const typingEl = addTyping();
  await new Promise(r=>setTimeout(r, 600));
  typingEl.remove();
  const result = analyze(q);
  renderResult(result);
  isTyping = false;
  scrollBottom();
}

function renderResult(r) {
  const chips = r.chips || [];
  const div = document.createElement('div');
  div.className = 'msg-row bot';
  div.innerHTML = `<div class="avatar bot-av">AI</div><div class="msg-content"><div class="bubble"><p>${r.message}</p></div></div>`;
  messagesEl.appendChild(div);
  const content = div.querySelector('.msg-content');
  if (r.chartType && r.chartType !== 'none' && r.labels && r.labels.length) {
    content.appendChild(renderChart(r.chartType, r.labels, r.datasets, r.chartTitle));
  }
  if (r.insight) {
    const ib = document.createElement('div');
    ib.className = 'insight-box';
    ib.textContent = r.insight;
    content.appendChild(ib);
  }
  if (chips.length) {
    const cd = document.createElement('div');
    cd.className = 'chips';
    cd.innerHTML = chips.map(c=>`<button class="chip" onclick="askQuestion('${c}')">${c}</button>`).join('');
    content.appendChild(cd);
  }
  scrollBottom();
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className='msg-row user';
  d.innerHTML=`<div class="avatar user-av">나</div><div class="msg-content"><div class="bubble">${text}</div></div>`;
  messagesEl.appendChild(d);
  scrollBottom();
}
function addBotMsg(html, chips=[]) {
  const d = document.createElement('div');
  d.className='msg-row bot';
  const chipsHTML = chips.map(c=>`<button class="chip" onclick="askQuestion('${c}')">${c}</button>`).join('');
  d.innerHTML=`<div class="avatar bot-av">AI</div><div class="msg-content"><div class="bubble">${html}</div>${chips.length?`<div class="chips">${chipsHTML}</div>`:''}</div>`;
  messagesEl.appendChild(d);
  scrollBottom();
  return d;
}
function addTyping() {
  const d = document.createElement('div');
  d.className='typing-row';
  d.innerHTML=`<div class="avatar bot-av">AI</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(d);
  scrollBottom();
  return d;
}
function scrollBottom() { messagesEl.scrollTop=messagesEl.scrollHeight; }

// ── 빠른 질문 ──────────────────────────────────────────────
const QUICK_QS = [
  '연도별 매출 추이',
  '제품별 매출 비교',
  'SR별 실적 순위',
  '지역별 매출 분포',
  '분기별 매출 현황',
  '고객 유형별 분석',
  'SR vs 딜러 비율',
  '판매 대수 제품 순위',
];
document.getElementById('quick-list').innerHTML = QUICK_QS.map(q=>`<button class="quick-item" onclick="askQuestion('${q}')">${q}</button>`).join('');

// ── 시작 ────────────────────────────────────────────────────
initFilters();
updateKPI();
addBotMsg(
  `안녕하세요! <strong>2021~2026년 장비 판매 데이터</strong>가 로드됐습니다.<br>총 <strong>${ALL_DATA.length.toLocaleString()}건</strong>의 거래 기록을 분석할 수 있어요.<br>왼쪽 필터로 기간/제품/SR을 좁히거나, 아래 질문 예시를 눌러보세요!`,
  ['연도별 매출 추이', 'SR별 실적 순위', '제품별 매출 비교']
);
